name: 功能请求
description: 提议新功能或改进现有功能
labels: ["type: feature"]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: 涉及的插件
      description: 选择此功能涉及的插件
      options:
        - structured-workflow
        - gitee-toolkit
        - agent-native-design-guide
        - dida365-toolkit
        - 新插件提议
        - 通用（仓库级别）
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 功能概述
      description: 简要描述你希望添加的功能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述你遇到的问题或需求背景，帮助我们理解为什么需要此功能
    validations:
      required: true

  - type: textarea
    id: expected-usage
    attributes:
      label: 期望的使用方式
      description: 描述你希望如何使用此功能（例如命令格式、交互流程）
      placeholder: |
        例如:
        1. 执行 `/xxx` 命令
        2. 选择参数 ...
        3. 得到结果 ...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 描述你考虑过的其他解决方式（可选）
    validations:
      required: false
